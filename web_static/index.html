<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHx Tip Bot | Web Dashboard</title>
  
  <script>
    function logError(msg) {
        const debug = document.getElementById('debug-log');
        if (debug) {
            debug.style.display = 'block';
            debug.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        }
    }
    window.onunhandledrejection = (e) => logError(`Promise Rejection: ${e.reason}`);
    alert("Diagnostic: Pre-Module Script Executed");
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.7);
      --border: rgba(59, 130, 246, 0.2);
      --border-hover: rgba(59, 130, 246, 0.5);
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --error: #ef4444;
    }

    #load-status {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: #ffd700;
      padding: 8px 15px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10000;
      border: 1px solid #ffd700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .background-castle {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('/static/stronghold_logo_watermark.svg');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 60%;
      opacity: 0.15;
      z-index: -1;
      filter: blur(2px);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      margin-bottom: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #3b82f6;
    }

    .logo img { width: 32px; height: 32px; }

    .hero {
      text-align: center;
      padding: 4rem 0;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 3.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      border-radius: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary { background: #3b82f6; color: white; }
    .btn-secondary { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #debug-log {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      max-height: 200px; overflow-y: auto;
      background: rgba(0,0,0,0.9);
      color: #4ade80;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      z-index: 10001;
      display: none;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="load-status">System: JavaScript Loading...</div>
  <div class="background-castle"></div>

  <div class="container">
    <nav>
      <div class="logo">
        <img src="/static/stronghold_logo_watermark.svg" alt="SHx">
        <span>SHx Tip Bot</span>
      </div>
      <div id="wallet-status">
        <button id="btn-connect" class="btn btn-secondary">
            <span>🌐</span> Connect Stellar Wallet
        </button>
        <div id="wallet-display" class="wallet-info hidden">
            <span id="address-short">Loading...</span>
        </div>
      </div>
    </nav>

    <div class="hero">
      <h1>Your Community Portal</h1>
      <p>Securely link your wallet and manage your community rewards.</p>
    </div>

    <!-- Link Wallet Section -->
    <div class="card">
      <h2>Discord Verification</h2>
      <p id="link-status-text" style="color: var(--text-muted); margin-bottom: 1.5rem;">Checking status...</p>
      <div id="status-box" class="status hidden"></div>
      <button id="btn-link" class="btn btn-primary" disabled>Verify & Link Wallet</button>
      <button id="btn-unlink" class="btn btn-secondary" style="margin-left: 10px;">Unlink</button>
    </div>

    <!-- Instructions / Balance Card -->
    <div class="card">
        <h2>House Account Details</h2>
        <div style="margin-top: 1rem;">
            <p style="font-size: 0.9rem; color: var(--text-muted);">House Account Address:</p>
            <div style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: 5px;">
                <code id="addr-text" style="color: #4ade80;">GBX...</code>
                <button id="btn-copy-addr" class="btn" style="padding: 5px 10px; font-size: 11px;">Copy</button>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">Available Memo: <strong id="memo-text">12345</strong> <button id="btn-copy-memo" class="btn" style="padding: 2px 5px; font-size: 10px;">Copy</button></p>
        </div>
    </div>

    <!-- Withdrawals Section (Conditionally Visible) -->
    <div id="claim-card" class="card hidden">
      <h2>Pending Withdrawal</h2>
      <div id="claim-status" class="status hidden"></div>
      <button id="btn-claim-action" class="btn btn-primary" style="background: #10b981; width: 100%; justify-content: center; margin-top: 1rem;">
        Claim SHx Rewards
      </button>
    </div>
  </div>

  <div id="debug-log"></div>

  <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk/dist/stellar-sdk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>
    async function initDashboard() {
        alert("Standard Script: Initializing Dashboard...");
        const status = document.getElementById('load-status');
        const debug = document.getElementById('debug-log');
        
        function updateProgress(msg) {
            console.log(msg);
            if (debug) {
                debug.style.display = 'block';
                debug.innerHTML += `<div style="color: #00ff00">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            }
        }

        try {
            updateProgress("Loading locally-hosted Stellar Wallets Kit...");
            // Use the local bundle we just downloaded
            const sdk = await import("/static/lib/swk_bundle.mjs");
            updateProgress("Local bundle loaded successfully! ✅");

            const { 
                StellarWalletsKit, 
                WalletNetwork, 
                KitEventType,
                SwkAppDarkTheme,
                FreighterModule, 
                AlbedoModule, 
                WalletConnectModule 
            } = sdk;

            if (status) status.innerText = "System: JavaScript Ready ✅";
            alert("SUCCESS: Dashboard Fully Loaded (Local Mode)");

            // -- APP LOGIC START --
            const urlParams = new URLSearchParams(window.location.search);
            const TOKEN = urlParams.get('token') || "{{TOKEN}}";
            const CLAIM_ID = urlParams.get('claim_id') || "{{CLAIM_ID}}";
            const NETWORK = "{{NETWORK}}";
            const NETWORK_PASSPHRASE = "{{NETWORK_PASSPHRASE}}";
            const SOROBAN_CONTRACT_ID = "{{SOROBAN_CONTRACT_ID}}";
            const DISCORD_ID = "{{DISCORD_ID}}";
            const WC_PROJECT_ID = '1da02e75fe8efd7560248dc15804b13c';
            
            const API_BASE = window.location.origin;
            const HORIZON_URL = (NETWORK === 'mainnet' || NETWORK === 'public') ? 'https://horizon.stellar.org' : 'https://horizon-testnet.stellar.org';
            const SOROBAN_URL = (NETWORK === 'mainnet' || NETWORK === 'public') ? 'https://soroban.stellar.org' : 'https://soroban-testnet.stellar.org';

            let _kit = null;
            let userAddress = null;

            const updateLinkStatus = (msg, isError = false) => {
                const box = document.getElementById('status-box');
                if (box) { box.style.display = 'block'; box.className = `status ${isError ? 'error' : 'success'}`; box.innerText = msg; }
            };

            const updateClaimStatus = (msg, isError = false) => {
                const box = document.getElementById('claim-status');
                if (box) { box.style.display = 'block'; box.className = `status ${isError ? 'error' : 'success'}`; box.innerText = msg; }
            };

            function initKit() {
                if (_kit) return _kit;
                _kit = StellarWalletsKit.init({
                    network: (NETWORK === 'mainnet' || NETWORK === 'public') ? WalletNetwork.PUBLIC : WalletNetwork.TESTNET,
                    theme: SwkAppDarkTheme,
                    modules: [
                        new FreighterModule(),
                        new AlbedoModule(),
                        new WalletConnectModule({
                            projectId: WC_PROJECT_ID,
                            chains: [(NETWORK === 'mainnet' || NETWORK === 'public') ? 'stellar:pubnet' : 'stellar:testnet'],
                            url: 'https://shxtipbotv1.vercel.app',
                        }),
                    ],
                });

                _kit.on(KitEventType.STATE_UPDATED, (state) => {
                    if (state.address) {
                        userAddress = state.address;
                        document.getElementById('btn-connect').classList.add('hidden');
                        document.getElementById('wallet-display').classList.remove('hidden');
                        document.getElementById('address-short').innerText = `${userAddress.substring(0,6)}...${userAddress.substring(52)}`;
                        document.getElementById('btn-link').disabled = false;
                        const claimBtn = document.getElementById('btn-claim-action');
                        if (claimBtn) claimBtn.disabled = false;
                    } else {
                        userAddress = null;
                        document.getElementById('btn-connect').classList.remove('hidden');
                        document.getElementById('wallet-display').classList.add('hidden');
                        document.getElementById('btn-link').disabled = true;
                    }
                });
                return _kit;
            }

            window.connectWallet = async () => {
                const kit = initKit();
                try {
                    await kit.openModal({
                        modalTitle: "Connect Your Wallet",
                        modalDescription: "Choose your favorite Stellar wallet.",
                    });
                } catch (e) { alert("Modal error: " + e.message); }
            };

            async function handleLink() {
                if (!userAddress) return;
                try {
                    updateLinkStatus("Signing link request...", false);
                    const server = new window.StellarSdk.Server(HORIZON_URL);
                    const account = await server.loadAccount(userAddress);
                    const tx = new window.StellarSdk.TransactionBuilder(account, { fee: "1000", networkPassphrase: NETWORK_PASSPHRASE })
                        .addOperation(window.StellarSdk.Operation.manageData({ name: "Link Discord", value: DISCORD_ID }))
                        .setTimeout(300).build();

                    const kit = initKit();
                    const { signedTxXdr } = await kit.signTransaction(tx.toXDR(), {
                        networkPassphrase: NETWORK_PASSPHRASE, address: userAddress
                    });
                    updateLinkStatus("Verifying on server...", false);
                    const res = await axios.post(`${API_BASE}/api/link`, { token: TOKEN, public_key: userAddress, signature_xdr: signedTxXdr, is_approved: true });
                    if (res.data.success) {
                        updateLinkStatus("✅ Wallet linked successfully!", false);
                        document.getElementById('link-status-text').innerText = "Linked ✅";
                    }
                } catch (e) { updateLinkStatus(e.message, true); }
            }

            async function claimWithdrawal() {
                if (!userAddress) return;
                try {
                    updateClaimStatus("Preparing claim...", false);
                    const res = await axios.get(`${API_BASE}/api/withdrawal/${CLAIM_ID}`);
                    if (!res.data.success) throw new Error(res.data.message);
                    const { amount, nonce, signature } = res.data;
                    const server = new window.StellarSdk.Server(HORIZON_URL);
                    const sorobanServer = new window.StellarSdk.SorobanServer(SOROBAN_URL);
                    const account = await server.loadAccount(userAddress);
                    const sigBytes = Uint8Array.from(atob(signature), c => c.charCodeAt(0));
                    const amountStroops = BigInt(Math.round(amount * 10000000));
                    const tx = new window.StellarSdk.TransactionBuilder(account, { fee: "100000", networkPassphrase: NETWORK_PASSPHRASE })
                        .addOperation(window.StellarSdk.Operation.invokeContractFunction({
                            contractId: SOROBAN_CONTRACT_ID,
                            function: "claim_withdrawal",
                            args: [
                                window.StellarSdk.nativeToScVal(userAddress, { type: 'address' }),
                                window.StellarSdk.nativeToScVal(amountStroops, { type: 'i128' }),
                                window.StellarSdk.nativeToScVal(BigInt(nonce), { type: 'u64' }),
                                window.StellarSdk.xdr.ScVal.scvBytes(sigBytes)
                            ]
                        })).setTimeout(300).build();
                    
                    updateClaimStatus("Sumulating...", false);
                    const sim = await sorobanServer.simulateTransaction(tx);
                    const preparedTx = await sorobanServer.prepareTransaction(tx, sim);
                    updateClaimStatus("Awaiting Signature...", false);
                    const kit = initKit();
                    const { signedTxXdr } = await kit.signTransaction(preparedTx.toXDR(), { networkPassphrase: NETWORK_PASSPHRASE, address: userAddress });
                    updateClaimStatus("Submitting...", false);
                    const resp = await sorobanServer.sendTransaction(window.StellarSdk.TransactionBuilder.fromXDR(signedTxXdr, NETWORK_PASSPHRASE));
                    updateClaimStatus("✅ Claim submitted! Waiting for confirmation...", false);
                } catch (e) { updateClaimStatus(e.message, true); }
            }

            async function cancelWithdrawal() {
                if (!confirm("Cancel?")) return;
                try {
                    await axios.post(`${API_BASE}/api/withdrawal/${CLAIM_ID}/cancel`, { token: TOKEN });
                    location.reload();
                } catch (e) { alert(e.message); }
            }

            // Wire UI
            document.getElementById('btn-connect').onclick = window.connectWallet;
            document.getElementById('wallet-display').onclick = window.connectWallet;
            document.getElementById('btn-link').onclick = handleLink;
            document.getElementById('btn-unlink').onclick = async () => {
                if (!confirm("Unlink?")) return;
                await axios.post(`${API_BASE}/api/unlink`, { token: TOKEN });
                location.reload();
            };
            const btnClaim = document.getElementById('btn-claim-action');
            if (btnClaim) btnClaim.onclick = claimWithdrawal;
            
            document.getElementById('btn-copy-addr').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('addr-text').innerText);
                alert("Copied!");
            };

            if (CLAIM_ID && CLAIM_ID.length > 5 && CLAIM_ID !== "{{CLAIM_ID}}") document.getElementById('claim-card').classList.remove('hidden');
            const existing = "{{EXISTING_KEY_VAL}}";
            if (existing && existing.length > 10 && existing !== "{{EXISTING_KEY_VAL}}") document.getElementById('link-status-text').innerText = "Linked ✅";
            
        } catch (e) {
            updateProgress("CRITICAL LOAD ERROR: " + e.message);
        }
    }
    window.onload = initDashboard;
  </script>
</body>
</html>
